name: Docs Build Check

# Guarantees on every push and PR:
#   1. The public API actually EXTRACTS. Before this workflow, the shadow csproj failed to compile
#      (UI Toolkit / uGUI references missing) so DocFX extracted zero API, yet the job stayed green
#      because it only checked that _site/index.html existed. This workflow regenerates
#      Documentation~/api-reference.md from the current XML doc comments and FAILS if the public
#      types are missing - a zero/partial extraction can no longer masquerade as a pass.
#   2. The committed api-reference.md is NOT stale: a CI regen (minus the known Unity-IAP-conditional
#      surface, masked from both sides) must match the committed file. See the drift guard below.
#   3. The DocFX site builds cleanly (deployed by docs-deploy.yml on master push).
#
# On the drift guard (step "Guard - api-reference.md is not stale"): the committed file is generated
# by a developer whose project has com.unity.purchasing compiled, so it documents the
# `#if UNITY_PURCHASING_INSTALLED`-gated purchasing API (Palette.AttachPurchaseTracking + a
# TrackPurchase cross-reference). Unity.Purchasing.dll is a per-project package assembly NOT present
# in the game-ci base image, so a CI regen omits that section - a raw byte diff would false-positive
# every run. Tools~/api-reference-mask.awk strips that enumerable conditional set from BOTH the
# committed file and the CI regen before diffing. Failure modes both point safe: any non-conditional
# drift trips the diff (what we want), and a NEW purchasing-gated member trips it too (visible, so a
# human extends the mask consciously - never a silent miss).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Verify api extraction + docs site
    runs-on: ubuntu-latest
    # Forks can't use the Unity license secret. Skip on forked PRs; the
    # maintainer still gets the check on their own push and on merge.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install docfx + DocFxMarkdownGen
        run: |
          dotnet tool install -g docfx
          dotnet tool install -g DocFxMarkdownGen
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # game-ci's Unity Docker images contain the reference DLLs the shadow csproj needs.
      # We don't run Unity - just grab the DLLs out of the image and point UNITY_PATH at them.
      #   - Managed/UnityEngine/*.dll  : core engine + module DLLs (incl. UnityEngine.UIElementsModule,
      #     which the UI Toolkit debug-menu overlay reached via Palette.ShowDebugger needs).
      #   - UnityEngine.UI.dll (uGUI)  : NOT a Managed core module; it is a built-in package compiled
      #     per-project. The debug-menu EventSystem factory (also reachable via Palette.ShowDebugger)
      #     needs UnityEngine.EventSystems, which lives in it. The editor ships a precompiled copy
      #     under ProjectTemplates; we locate it with `find` (the path carries a template version) and
      #     drop it into the Managed/UnityEngine folder so $(UnityManaged) resolves it. If it cannot be
      #     found the step FAILS LOUD rather than silently producing a zero-API extraction.
      - name: Cache Unity reference DLLs
        id: cache-unity-refs
        uses: actions/cache@v4
        with:
          path: unity-refs
          # Bump this key when bumping the Unity version, game-ci image tag, or this DLL set.
          key: unity-managed-6000.4.0f1-base-3.2.2-ugui-v2

      - name: Extract Unity reference DLLs from game-ci image
        if: steps.cache-unity-refs.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          IMAGE="unityci/editor:ubuntu-6000.4.0f1-base-3.2.2"
          docker pull "$IMAGE"
          CID=$(docker create "$IMAGE")
          DEST=unity-refs/Unity.app/Contents/Resources/Scripting/Managed/UnityEngine
          mkdir -p "$DEST"
          docker cp "$CID:/opt/unity/Editor/Data/Managed/UnityEngine/." "$DEST/"

          # Locate a precompiled uGUI assembly inside the image (path carries a template version,
          # so resolve it dynamically) and place it next to the Managed DLLs.
          UGUI_IN_IMAGE=$(docker run --rm "$IMAGE" sh -c "find /opt/unity -name UnityEngine.UI.dll 2>/dev/null | head -1")
          if [ -z "$UGUI_IN_IMAGE" ]; then
            echo "::error::UnityEngine.UI.dll (uGUI) not found in $IMAGE. The docs shadow build needs it" \
                 "for UnityEngine.EventSystems (reachable via Palette.ShowDebugger). Update this step" \
                 "with the correct uGUI source before api extraction can run."
            docker rm "$CID" >/dev/null
            exit 1
          fi
          docker cp "$CID:$UGUI_IN_IMAGE" "$DEST/UnityEngine.UI.dll"
          docker rm "$CID"

          test -f "$DEST/UnityEngine.dll"
          test -f "$DEST/UnityEngine.CoreModule.dll"
          test -f "$DEST/UnityEngine.UIElementsModule.dll"
          test -f "$DEST/UnityEngine.UI.dll"

      - name: Regenerate api-reference.md (exercises the extraction pipeline)
        env:
          UNITY_PATH: ${{ github.workspace }}/unity-refs
          DOTNET_ROLL_FORWARD: LatestMajor
        run: bash Tools~/build-docs.sh

      # Zero-API guard: build-docs.sh already aborts if DocFX emits none of the allowlisted per-type
      # markdown files, but assert the public types are present in the concatenated output too, so a
      # partial/empty extraction can never masquerade as a passing regen. Runs on the freshly
      # regenerated file, so it tests EXTRACTION, not just the committed artifact.
      - name: Guard - extraction produced the public API
        run: |
          set -euo pipefail
          REF=Documentation~/api-reference.md
          for type in Palette SorollaConfig CurrencyId EconomySource EconomySink PlatformAdUnitId; do
            grep -qE "^#+ .*\b${type}\b" "$REF" || {
              echo "::error::api-reference.md is missing the '${type}' section - DocFX extracted no/partial API."
              exit 1
            }
          done
          echo "✓ extraction produced the expected public types"

      # Drift guard: the regen above (Purchasing-less) must match the committed file once the known
      # IAP-conditional surface is masked from both sides. Any other difference means a `///` comment
      # or public signature changed without regenerating api-reference.md. build-docs.sh has already
      # overwritten the working copy with the CI regen, so the committed file comes from git.
      - name: Guard - api-reference.md is not stale
        run: |
          set -euo pipefail
          git show HEAD:Documentation~/api-reference.md > /tmp/committed-api-reference.md
          if ! diff -u \
              <(awk -f Tools~/api-reference-mask.awk /tmp/committed-api-reference.md) \
              <(awk -f Tools~/api-reference-mask.awk Documentation~/api-reference.md); then
            echo "::error::api-reference.md is stale (drift outside the masked IAP-conditional surface)." \
                 "Run 'UNITY_PATH=<editor> bash Tools~/build-docs.sh' and commit the result." \
                 "If you added a new #if UNITY_PURCHASING_INSTALLED member, also extend Tools~/api-reference-mask.awk."
            exit 1
          fi
          echo "✓ api-reference.md matches the current XML doc comments"

      - name: Build docs site
        env:
          UNITY_PATH: ${{ github.workspace }}/unity-refs
          DOTNET_ROLL_FORWARD: LatestMajor
        run: |
          cd Documentation~/docfx
          docfx docfx.json

      - name: Verify site output
        run: |
          test -f Documentation~/docfx/_site/index.html
          echo "✓ Docs site built successfully"
