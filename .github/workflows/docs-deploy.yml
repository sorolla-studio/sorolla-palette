name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install docfx
        run: |
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Cache Unity managed DLLs
        id: cache-unity-refs
        uses: actions/cache@v4
        with:
          path: unity-refs
          key: unity-managed-6000.4.0f1-base-3.2.2

      - name: Extract Unity managed DLLs from game-ci image
        if: steps.cache-unity-refs.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          IMAGE="unityci/editor:ubuntu-6000.4.0f1-base-3.2.2"
          docker pull "$IMAGE"
          CID=$(docker create "$IMAGE")
          mkdir -p unity-refs/Unity.app/Contents/Resources/Scripting/Managed/UnityEngine
          docker cp "$CID:/opt/unity/Editor/Data/Managed/UnityEngine/." \
            unity-refs/Unity.app/Contents/Resources/Scripting/Managed/UnityEngine/
          docker rm "$CID"
          test -f unity-refs/Unity.app/Contents/Resources/Scripting/Managed/UnityEngine/UnityEngine.dll
          test -f unity-refs/Unity.app/Contents/Resources/Scripting/Managed/UnityEngine/UnityEngine.CoreModule.dll

      - name: Build docs site
        env:
          UNITY_PATH: ${{ github.workspace }}/unity-refs
          DOTNET_ROLL_FORWARD: LatestMajor
        run: |
          cd Documentation~/docfx
          docfx docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Documentation~/docfx/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
